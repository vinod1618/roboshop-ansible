- name: configure mysql server
  hosts: mysql
  become: yes
  tasks:
  - name: install mysql server
    ansible.builtin.ddnf:
     name: mysql-server
     state: present

  - name: start and enable mysql server
    ansible.builtin.service:
      name: mysqld
      state: restarted
      enabled: yes

  - name: setup root password
    ansible.nuiltin.command: mysql_secure_installation --set-root-pass RoboShop@1