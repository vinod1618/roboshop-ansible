- name: configure redis server
  hosts: redis
  become: yes
  tasks:
  - name: enable redis
    ansible.builtin.commad: dnf module enable redis:7 -y

  - name: install redis
    ansible.builtin.dnf:
      name: dis
      state: present

  - name: allow remote connections
    ansible.builtin.replace:
      path: /etc/redis/redis.conf
      regexp: '127.0.0.1'
      replace: '0.0.0.0'

  - name: turning off protected mode
    ansible.builtin.lineinfile:
      path: /etc/redis/redis.conf
      regexp: '^(.*)protected-mode(.*)$'
      line: 'protected-mode no'

  - name: start and enable redis
    ansible.builtin.service:
      name: redis
      state: restarted
      enable: yes

