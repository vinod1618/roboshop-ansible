- name: configure payment server
  hosts: payment
  become: yes
  tasks:
  - name: install pythin
    ansible.builtin.dnf:
      name: "{{ item }}"
      state: present
    loop:
    - python3 
    - gcc 
    - python3-devel

  - name: create system user roboshop
    ansible.builtin.user:
      name: roboshop
      system: true
      home: /app
      shell: /sbin/nologin
      comment: "roboshop system user"

  - name: ansible delete app directory
    ansible.builtin.file:
      path: /app
      state: absent

  - name: create app directory
    ansible.builtin.file:
      path: /app
      state: directory

  - name: delete payment zip file
    ansible.builtin.file:
      path: /tmp/shipping.zip
      state: absent
      
  - name: download shipping
    ansible.builtin.get_url:
      url: https://roboshop-artifacts.s3.amazonaws.com/payment-v3.zip
      dest: /tmp/payment.zip

  - name: unzip the file
    ansible.builtin.unarchive:
      src: /tmp/payment.zip
      dest: /app 
      remote_src: yes

  - name: install dependencies
    ansible.builtin.pip:
      requirements: requirements.txt
      executable: pip3.9
    args:
      chdir: /app

  - name: copy the service file
    ansible.builtin.template:
      src: payment.service
      dest: /etc/systemd/system/payment.service

  - name: Reload systemd daemon
    ansible.builtin.systemd_service:
      daemon_reload: true

  - name: enable and start payment
    ansible.builtin.service:
      name: payment
      state: restarted
      enabled: yes 
