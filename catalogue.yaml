- name: configure catalogue host
  hosts: catalogue
  become: yes
  tasks:
    - name: disable dnf module and enable node js 20
      ansible.builtin.command: dnf module enable nodejs:20 -y

    - name: install nodejs 20
      ansible.builtin.dnf:
        name: nodejs
        state: present
    
    - name: create system user roboshop
      ansible.builtin.user:
        name: roboshop
        system: true
        home: /app
        shell: /sbin/nologin
        comment: "roboshop system user"

    - name: ansible delete app directory
      ansible.builtin.file:
        path: /app
        state: absent

    - name: create app directory
      ansible.builtin.file:
        path: /app
        state: directory

    - name: delete catalogue zip file
      ansible.builtin.file:
        path: /tmp/catalogue.zip
        state: absent
      
    - name: download catalogue
      ansible.builtin.get_url:
        url: https://roboshop-artifacts.s3.amazonaws.com/catalogue-v3.zip
        dest: /tmp/catalogue.zip

    - name: unzip the file
      ansible.builtin.unarchive:
        src: /tmp/catalogue.zip
        dest: /app 
        remote_src: yes

    - name: install dependencies
      community.general.npm:
        path: /app

    - name: copy catalogue service
      ansible.builtin.template:
        src: catalogue.service.j2
        dest: /etc/systemd/system/catalogue.service

    - name: Reload systemd daemon
      ansible.builtin.systemd_service:
        daemon_reload: true

    - name: copy mongo repo
      ansible.builtin.copy:
        src: mongo.repo
        dest: /etc/yum.repos.d/mongo.repo

    - name: install mongodb client software
      ansible.builtin.dnf:
        name: mongodb-mongosh
        state: present

    - name: check products are loaded or not
      ansible.builtin.command: mongosh --host "{{ MONGODB_HOST }}" --quiet  --eval 'db.getMongo().getDBNames().indexOf("catalogue")'
      register: catalogue_output

    - name: print catalogue output
      ansible.builtin.debug:
        msg: "{{ catalogue_output }}"

    - name: load the products
      ansible.builtin.shell: mongosh --host "{{ MONGODB_HOST }}" </app/db/master-data.js
      when: catalogue_output.stdout | int < 0

    - name: start catalogue service
      ansible.builtin.service:
        name: catalogue
        state: restarted
        enabled: yes
